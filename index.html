<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro 타이머</title>
    <!-- 기본 스타일 임포트 -->
    <link rel="stylesheet" href="/src/css/reset.css" />
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <!-- 앱 루트 컨테이너 -->
    <div id="app">
      <!-- 헤더 영역 -->
      <header class="app-header">
        <h1 class="app-title">Pomodoro 타이머</h1>
        <!-- 설정 열기 버튼 -->
        <button class="btn-settings" id="settingsBtn" aria-label="설정 열기">설정</button>
      </header>

      <!-- 메인 타이머 영역 -->
      <main class="timer-container">
        <!-- 세션 유형 탭 -->
        <nav class="session-tabs">
          <button class="tab-btn tab-btn--active" data-mode="pomodoro">뽀모도로</button>
          <button class="tab-btn" data-mode="short-break">짧은 휴식</button>
          <button class="tab-btn" data-mode="long-break">긴 휴식</button>
        </nav>

        <!-- 타이머 표시 영역 -->
        <section class="timer-display">
          <div class="time-remaining" id="timeDisplay">25:00</div>
        </section>

        <!-- 타이머 컨트롤 버튼 -->
        <section class="timer-controls">
          <button class="btn btn--primary" id="startStopBtn">시작</button>
          <button class="btn btn--secondary" id="resetBtn">초기화</button>
        </section>

        <!-- 세션 카운터 -->
        <section class="session-counter">
          <span class="session-label">완료한 뽀모도로</span>
          <span class="session-count" id="sessionCount">0</span>
        </section>
      </main>

      <!-- 설정 패널 (숨김 상태) -->
      <aside class="settings-panel" id="settingsPanel" hidden>
        <h2 class="settings-title">설정</h2>
        <!-- 타이머 시간 설정 폼 -->
        <form class="settings-form" id="settingsForm" novalidate>
          <!-- 뽀모도로 시간 설정 -->
          <div class="settings-field">
            <label class="settings-label" for="settingPomodoro">뽀모도로 (분)</label>
            <input
              class="settings-input"
              id="settingPomodoro"
              type="number"
              min="1"
              max="99"
              value="25"
            />
          </div>
          <!-- 짧은 휴식 시간 설정 -->
          <div class="settings-field">
            <label class="settings-label" for="settingShortBreak">짧은 휴식 (분)</label>
            <input
              class="settings-input"
              id="settingShortBreak"
              type="number"
              min="1"
              max="99"
              value="5"
            />
          </div>
          <!-- 긴 휴식 시간 설정 -->
          <div class="settings-field">
            <label class="settings-label" for="settingLongBreak">긴 휴식 (분)</label>
            <input
              class="settings-input"
              id="settingLongBreak"
              type="number"
              min="1"
              max="99"
              value="15"
            />
          </div>
          <!-- 저장/취소 버튼 영역 -->
          <div class="settings-actions">
            <button class="btn btn--primary" type="button" id="settingsSaveBtn">저장</button>
            <button class="btn btn--secondary" type="button" id="settingsCancelBtn">취소</button>
          </div>
        </form>
      </aside>
    </div>

    <!-- 앱 메인 진입점 (ES 모듈) -->
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
