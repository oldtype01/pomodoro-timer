<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro 타이머</title>
    <!-- 기본 스타일 임포트 -->
    <link rel="stylesheet" href="/src/css/reset.css" />
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <!-- 앱 루트 컨테이너 -->
    <div id="app">
      <!-- 헤더 영역 -->
      <header class="app-header">
        <!-- 다크모드 토글 버튼 -->
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙</button>
        <h1 class="app-title">Pomodoro 타이머</h1>
        <!-- 설정 열기 버튼 -->
        <button class="btn-settings" id="settingsBtn" aria-label="설정 열기">설정</button>
      </header>

      <!-- 메인 타이머 영역 -->
      <main class="timer-container">
        <!-- 세션 유형 탭 -->
        <nav class="session-tabs">
          <button class="tab-btn tab-btn--active" data-mode="pomodoro">뽀모도로</button>
          <button class="tab-btn" data-mode="short-break">짧은 휴식</button>
          <button class="tab-btn" data-mode="long-break">긴 휴식</button>
        </nav>

        <!-- 타이머 표시 영역 -->
        <section class="timer-display">
          <!-- Time Timer 스타일 시계 -->
          <div class="time-timer">
            <svg class="time-timer__svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <!-- 배경 원판 -->
              <circle
                class="time-timer__background"
                cx="120"
                cy="120"
                r="108"
                fill="white"
                stroke="black"
                stroke-width="2"
              />

              <!-- 부채꼴 진행 영역 -->
              <path
                class="time-timer__sector"
                id="timerSector"
                d=""
                fill="red"
                opacity="0.9"
              />

              <!-- 중앙 점 -->
              <circle
                class="time-timer__center"
                cx="120"
                cy="120"
                r="3"
                fill="black"
              />

              <!-- 눈금선과 숫자 -->
              <!-- 5분 단위 긴 눈금선과 숫자 -->
              <!-- 0분 (12시) -->
              <line class="tick-major" x1="120" y1="12" x2="120" y2="28" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="120" y="44" text-anchor="middle" dominant-baseline="middle">0</text>

              <!-- 5분 (1시) -->
              <line class="tick-major" x1="173.5" y1="26.5" x2="166.6" y2="34.6" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="164" y="44" text-anchor="middle" dominant-baseline="middle">5</text>

              <!-- 10분 (2시) -->
              <line class="tick-major" x1="213.5" y1="66.5" x2="205.4" y2="73.4" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="196" y="76" text-anchor="middle" dominant-baseline="middle">10</text>

              <!-- 15분 (3시) -->
              <line class="tick-major" x1="228" y1="120" x2="212" y2="120" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="198" y="125" text-anchor="middle" dominant-baseline="middle">15</text>

              <!-- 20분 (4시) -->
              <line class="tick-major" x1="213.5" y1="173.5" x2="205.4" y2="166.6" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="196" y="164" text-anchor="middle" dominant-baseline="middle">20</text>

              <!-- 25분 (5시) -->
              <line class="tick-major" x1="173.5" y1="213.5" x2="166.6" y2="205.4" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="164" y="196" text-anchor="middle" dominant-baseline="middle">25</text>

              <!-- 30분 (6시) -->
              <line class="tick-major" x1="120" y1="228" x2="120" y2="212" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="120" y="198" text-anchor="middle" dominant-baseline="middle">30</text>

              <!-- 35분 (7시) -->
              <line class="tick-major" x1="66.5" y1="213.5" x2="73.4" y2="205.4" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="76" y="196" text-anchor="middle" dominant-baseline="middle">35</text>

              <!-- 40분 (8시) -->
              <line class="tick-major" x1="26.5" y1="173.5" x2="34.6" y2="166.6" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="44" y="164" text-anchor="middle" dominant-baseline="middle">40</text>

              <!-- 45분 (9시) -->
              <line class="tick-major" x1="12" y1="120" x2="28" y2="120" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="42" y="125" text-anchor="middle" dominant-baseline="middle">45</text>

              <!-- 50분 (10시) -->
              <line class="tick-major" x1="26.5" y1="66.5" x2="34.6" y2="73.4" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="44" y="76" text-anchor="middle" dominant-baseline="middle">50</text>

              <!-- 55분 (11시) -->
              <line class="tick-major" x1="66.5" y1="26.5" x2="73.4" y2="34.6" stroke="black" stroke-width="2"/>
              <text class="tick-number" x="76" y="44" text-anchor="middle" dominant-baseline="middle">55</text>

              <!-- 1분 단위 짧은 눈금선 -->
              <!-- 1분 -->
              <line class="tick-minor" x1="140.6" y1="14.6" x2="135.2" y2="20.7" stroke="black" stroke-width="1"/>
              <!-- 2분 -->
              <line class="tick-minor" x1="160.4" y1="19.6" x2="153.8" y2="26.2" stroke="black" stroke-width="1"/>

              <line class="tick-minor" x1="178.4" y1="27.6" x2="170.6" y2="35.4" stroke="black" stroke-width="1"/>
              <!-- 4분 -->
              <line class="tick-minor" x1="194.4" y1="38.6" x2="185.4" y2="47.6" stroke="black" stroke-width="1"/>

              <!-- 6분 -->
              <line class="tick-minor" x1="220.4" y1="79.6" x2="212.4" y2="86.2" stroke="black" stroke-width="1"/>
              <!-- 7분 -->
              <line class="tick-minor" x1="225.4" y1="99.4" x2="219.3" y2="104.8" stroke="black" stroke-width="1"/>
              <!-- 8분 -->
              <line class="tick-minor" x1="227.6" y1="120" x2="221.0" y2="120" stroke="black" stroke-width="1"/>
              <!-- 9분 -->
              <line class="tick-minor" x1="225.4" y1="140.6" x2="219.3" y2="135.2" stroke="black" stroke-width="1"/>

              <!-- 11분 -->
              <line class="tick-minor" x1="220.4" y1="160.4" x2="212.4" y2="153.8" stroke="black" stroke-width="1"/>
              <!-- 12분 -->
              <line class="tick-minor" x1="212.4" y1="178.4" x2="204.6" y2="170.6" stroke="black" stroke-width="1"/>
              <!-- 13분 -->
              <line class="tick-minor" x1="201.4" y1="194.4" x2="192.4" y2="185.4" stroke="black" stroke-width="1"/>
              <!-- 14분 -->
              <line class="tick-minor" x1="187.6" y1="208.4" x2="179.8" y2="198.8" stroke="black" stroke-width="1"/>

              <!-- 16분 -->
              <line class="tick-minor" x1="160.4" y1="220.4" x2="153.8" y2="213.8" stroke="black" stroke-width="1"/>
              <!-- 17분 -->
              <line class="tick-minor" x1="140.6" y1="225.4" x2="135.2" y2="219.3" stroke="black" stroke-width="1"/>
              <!-- 18분 -->
              <line class="tick-minor" x1="120" y1="227.6" x2="120" y2="221.0" stroke="black" stroke-width="1"/>
              <!-- 19분 -->
              <line class="tick-minor" x1="99.4" y1="225.4" x2="104.8" y2="219.3" stroke="black" stroke-width="1"/>

              <!-- 21분 -->
              <line class="tick-minor" x1="79.6" y1="220.4" x2="86.2" y2="213.8" stroke="black" stroke-width="1"/>
              <!-- 22분 -->
              <line class="tick-minor" x1="61.6" y1="212.4" x2="69.4" y2="204.6" stroke="black" stroke-width="1"/>
              <!-- 23분 -->
              <line class="tick-minor" x1="45.6" y1="201.4" x2="54.6" y2="192.4" stroke="black" stroke-width="1"/>
              <!-- 24분 -->
              <line class="tick-minor" x1="31.6" y1="187.6" x2="41.2" y2="179.8" stroke="black" stroke-width="1"/>

              <!-- 26분 -->
              <line class="tick-minor" x1="19.6" y1="160.4" x2="26.2" y2="153.8" stroke="black" stroke-width="1"/>
              <!-- 27분 -->
              <line class="tick-minor" x1="14.6" y1="140.6" x2="20.7" y2="135.2" stroke="black" stroke-width="1"/>
              <!-- 28분 -->
              <line class="tick-minor" x1="12.4" y1="120" x2="19.0" y2="120" stroke="black" stroke-width="1"/>
              <!-- 29분 -->
              <line class="tick-minor" x1="14.6" y1="99.4" x2="20.7" y2="104.8" stroke="black" stroke-width="1"/>

              <!-- 31분 -->
              <line class="tick-minor" x1="19.6" y1="79.6" x2="26.2" y2="86.2" stroke="black" stroke-width="1"/>
              <!-- 32분 -->
              <line class="tick-minor" x1="27.6" y1="61.6" x2="35.4" y2="69.4" stroke="black" stroke-width="1"/>
              <!-- 33분 -->
              <line class="tick-minor" x1="38.6" y1="45.6" x2="47.6" y2="54.6" stroke="black" stroke-width="1"/>
              <!-- 34분 -->
              <line class="tick-minor" x1="52.4" y1="31.6" x2="60.2" y2="41.2" stroke="black" stroke-width="1"/>

              <!-- 36분 -->
              <line class="tick-minor" x1="79.6" y1="19.6" x2="86.2" y2="26.2" stroke="black" stroke-width="1"/>
              <!-- 37분 -->
              <line class="tick-minor" x1="99.4" y1="14.6" x2="104.8" y2="20.7" stroke="black" stroke-width="1"/>
              <!-- 38분 -->
              <line class="tick-minor" x1="120" y1="12.4" x2="120" y2="19.0" stroke="black" stroke-width="1"/>
              <!-- 39분 -->
              <line class="tick-minor" x1="140.6" y1="14.6" x2="135.2" y2="20.7" stroke="black" stroke-width="1"/>

              <!-- 41분 -->
              <line class="tick-minor" x1="160.4" y1="19.6" x2="153.8" y2="26.2" stroke="black" stroke-width="1"/>
              <!-- 42분 -->
              <line class="tick-minor" x1="178.4" y1="27.6" x2="170.6" y2="35.4" stroke="black" stroke-width="1"/>
              <!-- 43분 -->
              <line class="tick-minor" x1="194.4" y1="38.6" x2="185.4" y2="47.6" stroke="black" stroke-width="1"/>
              <!-- 44분 -->
              <line class="tick-minor" x1="207.6" y1="52.4" x2="198.8" y2="60.2" stroke="black" stroke-width="1"/>

              <!-- 46분 -->
              <line class="tick-minor" x1="220.4" y1="79.6" x2="213.8" y2="86.2" stroke="black" stroke-width="1"/>
              <!-- 47분 -->
              <line class="tick-minor" x1="225.4" y1="99.4" x2="219.3" y2="104.8" stroke="black" stroke-width="1"/>
              <!-- 48분 -->
              <line class="tick-minor" x1="227.6" y1="120" x2="221.0" y2="120" stroke="black" stroke-width="1"/>
              <!-- 49분 -->
              <line class="tick-minor" x1="225.4" y1="140.6" x2="219.3" y2="135.2" stroke="black" stroke-width="1"/>

              <!-- 51분 -->
              <line class="tick-minor" x1="220.4" y1="160.4" x2="213.8" y2="153.8" stroke="black" stroke-width="1"/>
              <!-- 52분 -->
              <line class="tick-minor" x1="212.4" y1="178.4" x2="204.6" y2="170.6" stroke="black" stroke-width="1"/>
              <!-- 53분 -->
              <line class="tick-minor" x1="201.4" y1="194.4" x2="192.4" y2="185.4" stroke="black" stroke-width="1"/>
              <!-- 54분 -->
              <line class="tick-minor" x1="187.6" y1="208.4" x2="179.8" y2="198.8" stroke="black" stroke-width="1"/>

              <!-- 56분 -->
              <line class="tick-minor" x1="160.4" y1="220.4" x2="153.8" y2="213.8" stroke="black" stroke-width="1"/>
              <!-- 57분 -->
              <line class="tick-minor" x1="140.6" y1="225.4" x2="135.2" y2="219.3" stroke="black" stroke-width="1"/>
              <!-- 58분 -->
              <line class="tick-minor" x1="120" y1="227.6" x2="120" y2="221.0" stroke="black" stroke-width="1"/>
              <!-- 59분 -->
              <line class="tick-minor" x1="99.4" y1="225.4" x2="104.8" y2="219.3" stroke="black" stroke-width="1"/>

            </svg>
            <!-- 중앙 시간 및 레이블 텍스트 -->
            <div class="timer-info">
              <div class="session-label" id="sessionLabel">뽀모도로</div>
              <div class="time-remaining" id="timeDisplay">25:00</div>
            </div>
          </div>
        </section>

        <!-- 타이머 컨트롤 버튼 -->
        <section class="timer-controls">
          <button class="btn btn--primary" id="startStopBtn">시작</button>
          <button class="btn btn--secondary" id="resetBtn">초기화</button>
        </section>

        <!-- 세션 카운터 -->
        <section class="session-counter">
          <span class="session-label">완료한 뽀모도로</span>
          <span class="session-count" id="sessionCount">0</span>
        </section>
      </main>

      <!-- 설정 모달 다이얼로그 -->
      <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <aside class="settings-panel" id="settingsPanel">
          <!-- 모달 헤더 -->
          <div class="settings-header">
            <h2 class="settings-title" id="settingsTitle">설정</h2>
            <button class="modal-close-btn" id="settingsCloseBtn" aria-label="설정 닫기" type="button">×</button>
          </div>

          <!-- 타이머 시간 설정 폼 -->
          <form class="settings-form" id="settingsForm" novalidate>
            <!-- 뽀모도로 시간 설정 -->
            <div class="settings-field">
              <label class="settings-label" for="settingPomodoro">뽀모도로 (분)</label>
              <input
                class="settings-input"
                id="settingPomodoro"
                type="number"
                min="1"
                max="99"
                value="25"
                aria-describedby="pomodoroHelp"
              />
            </div>
            <!-- 짧은 휴식 시간 설정 -->
            <div class="settings-field">
              <label class="settings-label" for="settingShortBreak">짧은 휴식 (분)</label>
              <input
                class="settings-input"
                id="settingShortBreak"
                type="number"
                min="1"
                max="99"
                value="5"
                aria-describedby="shortBreakHelp"
              />
            </div>
            <!-- 긴 휴식 시간 설정 -->
            <div class="settings-field">
              <label class="settings-label" for="settingLongBreak">긴 휴식 (분)</label>
              <input
                class="settings-input"
                id="settingLongBreak"
                type="number"
                min="1"
                max="99"
                value="15"
                aria-describedby="longBreakHelp"
              />
            </div>
            <!-- 저장/취소 버튼 영역 -->
            <div class="settings-actions">
              <button class="btn btn--secondary" type="button" id="settingsCancelBtn">취소</button>
              <button class="btn btn--primary" type="button" id="settingsSaveBtn">저장</button>
            </div>
          </form>
        </aside>
      </div>
    </div>

    <!-- 앱 메인 진입점 (ES 모듈) -->
    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
